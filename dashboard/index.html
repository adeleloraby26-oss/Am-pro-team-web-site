<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AM PRO | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── MEMBERS TAB ── */
    .members-section { margin-top: 28px; }
    .section-tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; padding: 4px;
      width: fit-content;
    }
    .stab {
      background: none; border: none;
      color: rgba(255,255,255,.4); font-family:'Inter',sans-serif;
      font-size: 12px; font-weight: 700; padding: 7px 16px;
      border-radius: 10px; cursor: pointer;
      transition: all .2s; letter-spacing: .3px;
    }
    .stab.active { background: rgba(255,255,255,.1); color: #fff; }

    /* ── LEADERBOARD LIST ── */
    .leaderboard { display: flex; flex-direction: column; gap: 8px; }
    .lb-row {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px; padding: 12px 16px;
      cursor: pointer; transition: all .2s;
      text-decoration: none; color: inherit;
    }
    .lb-row:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.14);
      transform: translateX(-3px);
    }
    .lb-pos {
      font-family: 'Inter', monospace;
      font-size: 11px; font-weight: 800;
      color: rgba(255,255,255,.3); min-width: 26px;
      text-align: center;
    }
    .lb-pos.gold   { color: #ffcc00; }
    .lb-pos.silver { color: #cfd3d6; }
    .lb-pos.bronze { color: #a2845e; }
    .lb-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; flex-shrink: 0;
      overflow: hidden; position: relative;
    }
    .lb-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-sub  { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }
    .lb-rank-badge {
      font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .lb-level {
      font-family: 'Inter', monospace; font-size: 12px;
      color: rgba(255,255,255,.5); min-width: 30px; text-align: right;
    }

    /* ── PROFILES GRID ── */
    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .pcard {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px; padding: 18px 12px;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; text-align: center;
      cursor: pointer; transition: all .2s;
    }
    .pcard:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.16);
      transform: translateY(-3px);
    }
    .pcard-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; overflow: hidden;
    }
    .pcard-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .pcard-name { font-size: 13px; font-weight: 700; }
    .pcard-user { font-size: 11px; color: rgba(255,255,255,.4); margin-top:-4px; }
    .pcard-rank { font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
    .pcard-pos  { font-size: 10px; color: rgba(255,255,255,.35); font-family:'Inter',monospace; }

    /* ── PROFILE MODAL (member detail) ── */
    .profile-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6); backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .profile-overlay.hidden { display: none; }
    .profile-modal {
      background: #111; border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px; padding: 32px 28px;
      max-width: 360px; width: 100%;
      animation: popIn .3s cubic-bezier(.2,.8,.2,1);
      position: relative;
    }
    @keyframes popIn { from { opacity:0; transform:scale(.92) } }
    .pm-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,.07); border: none;
      border-radius: 50%; width: 32px; height: 32px;
      color: rgba(255,255,255,.6); cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .pm-close:hover { background: rgba(255,255,255,.14); }
    .pm-avatar {
      width: 84px; height: 84px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900; margin: 0 auto 14px;
      overflow: hidden;
    }
    .pm-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .pm-name { font-size: 22px; font-weight: 800; text-align: center; }
    .pm-user { font-size: 13px; color: rgba(255,255,255,.4); text-align: center; margin-bottom:16px; }
    .pm-rank {
      font-size: 13px; font-weight: 700; padding: 6px 20px;
      border-radius: 20px; display: inline-block; margin: 0 auto 18px;
    }
    .pm-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 18px;
    }
    .pm-stat {
      background: rgba(255,255,255,.05); border-radius: 12px;
      padding: 12px; text-align: center;
    }
    .pm-stat-val { font-size: 20px; font-weight: 800; }
    .pm-stat-lbl { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
    .pm-tasks-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .pm-task-item {
      background: rgba(255,255,255,.04); border-radius: 10px;
      padding: 10px 12px; font-size: 13px; margin-bottom: 6px;
      border-left: 2px solid rgba(255,255,255,.1);
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-right">
    <div class="logo-box">
      <img src="../logo.png" alt="AM PRO" onerror="this.style.opacity='0'">
    </div>
    <span class="dashboard-title">AM PRO</span>
  </div>
  <div class="nav-left">
    <button class="btn-logout" id="logoutBtn">Sign Out</button>
  </div>
</nav>

<div class="container">

  <!-- WELCOME -->
  <div class="welcome-card">
    <div class="welcome-msg" id="greetingText">Welcome</div>
    <div class="user-name" id="userName">Loading...</div>
    <div id="userRankDisplay" class="rank-display">—</div>
  </div>

  <!-- MY TASKS -->
  <div class="section-header">
    <div class="section-title">My Tasks</div>
    <div id="taskCount" style="font-size:12px;color:var(--apple-blue);font-weight:800;">0 TASKS</div>
  </div>
  <div id="tasksList" class="task-list"></div>

  <!-- MEMBERS -->
  <div class="members-section">
    <div class="section-header">
      <div class="section-title">Team Members</div>
      <div id="memberCount" style="font-size:12px;color:var(--apple-blue);font-weight:800;"></div>
    </div>

    <div class="section-tabs">
      <button class="stab active" onclick="switchMemberTab('leaderboard',this)">🏆 Leaderboard</button>
      <button class="stab" onclick="switchMemberTab('profiles',this)">👥 Profiles</button>
    </div>

    <div id="panel-leaderboard" class="leaderboard" id="leaderboardList"></div>
    <div id="panel-profiles" class="profiles-grid" style="display:none"></div>
  </div>

</div>

<!-- PROFILE MODAL -->
<div class="profile-overlay hidden" id="profileOverlay" onclick="closePM(event)">
  <div class="profile-modal" id="profileModal">
    <button class="pm-close" onclick="closePMbtn()">×</button>
    <div class="pm-avatar" id="pmAvatar"></div>
    <div class="pm-name"  id="pmName"></div>
    <div class="pm-user"  id="pmUser"></div>
    <div style="text-align:center">
      <span class="pm-rank" id="pmRank"></span>
    </div>
    <div class="pm-stats">
      <div class="pm-stat">
        <div class="pm-stat-val" id="pmLevel">—</div>
        <div class="pm-stat-lbl">Level</div>
      </div>
      <div class="pm-stat">
        <div class="pm-stat-val" id="pmTasks">—</div>
        <div class="pm-stat-lbl">Tasks</div>
      </div>
      <div class="pm-stat" style="grid-column:1/-1">
        <div class="pm-stat-val" id="pmField" style="font-size:14px;font-weight:600">—</div>
        <div class="pm-stat-lbl">Field</div>
      </div>
    </div>
    <div id="pmTasksWrap" style="display:none">
      <div class="pm-tasks-title">Tasks Assigned</div>
      <div id="pmTasksList"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="dash.js"></script>
</body>
</html>
